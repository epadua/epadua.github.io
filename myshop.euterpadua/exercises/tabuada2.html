<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tabuada2</title>
</head>
<body>
<script>
    var pulaLinha = function () {
        document.write("<br>");
    }

    var mostra = function (frase) {
        document.write(frase);
        pulaLinha();
        pulaLinha();
    }

    for(var multiplicador = 1; multiplicador <= 10; multiplicador = multiplicador +1){
        mostra(7 * multiplicador);
    }
</script>
</body>
</html>
