<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adivinha2</title>
</head>
<body>

<input type="text" id="numero">
<input type="submit" value="Compare com o meu segredo!" id="adivinhar">

<script>
    var segredos = [2, 4, 6, 8, 10, 12];

    var caixaDoNumero = document.getElementById("numero");

    var botaoClicado = function () {
        var achou = false;
        for(var i = 0; i < segredos.length; i = i +1){
            if(segredos[i] == caixaDoNumero.value){
                achou = true;
                break;
            }
        }
        if(achou == true){
            alert("Parabéns, você acertou um dos Numeros Secretos!");
        } else {
            alert("Você errou o Segredo!");
        }
    }

    var botaoAdivinhar = document.getElementById("adivinhar");
    botaoAdivinhar.onclick = botaoClicado;

</script>
</body>
</html>
