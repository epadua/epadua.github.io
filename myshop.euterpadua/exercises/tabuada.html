<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tabuada</title>
</head>
<body>
<script>
    var pulaLinha = function () {
        document.write("<br>");
    }

    var mostra = function (frase) {
        document.write(frase);
        pulaLinha();
        pulaLinha();
    }

    var multiplicador = 1;

    while(multiplicador <= 10){
        mostra(7 * multiplicador);
    multiplicador = multiplicador +1;
    }
</script>
</body>
</html>
